  - title: Matthew Urgero
    headline: Faithful Turtle — Architect & Operations
    description: "Matthew brings deep conviction and operational excellence to Lotusia. His focus on long-term sustainability over short-term speculation defines the project's ethos. He oversees ecosystem operations, community coordination, and strategic planning to ensure Lotusia grows as a genuine tool for human connection rather than financial exploitation."
    align: left
    features:
      - name: Ecosystem Operations
        description: Oversees day-to-day operations and community coordination
        icon: i-heroicons-cog-solid
      - name: Strategic Vision
        description: Drives the long-term roadmap aligned with Lotusia's core values
        icon: i-heroicons-light-bulb-solid
      - name: Community Building
        description: Fosters authentic human relationships within the Lotusia ecosystem
        icon: i-heroicons-heart-solid
cta:
  title: Built by People, for People
  description: Lotusia exists because its founders believe that technology should serve humanity. Every line of code, every infrastructure decision, every community interaction is guided by this principle. Join us in building something that matters.
