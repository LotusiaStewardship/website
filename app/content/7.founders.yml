title: Founders
description: Meet the founders behind Lotusia — the people building an ethical proof-of-work blockchain for humanity
ogTitle: Founders - Lotusia
navigation.icon: i-heroicons-user-group-solid
to: /founders
hero:
  title: The People Behind Lotusia
  description: Lotusia is built by engineers and visionaries who believe cryptocurrency should serve humanity, not exploit it. Meet the founders who are making that vision a reality.
sections:
  - title: Alexandre Guillioud
    headline: Hash Turtle — Blockchain Architect & Co-founder
    description: "Software architect with 12+ years of experience spanning embedded systems, distributed architectures, and solar energy. Alexandre co-founded Lotusia to build an ethical alternative to speculative cryptocurrencies. He leads the technical infrastructure: core blockchain development, custom WebGPU GPU miner, mining pool, and cross-chain bridging. Previously Senior Software Architect at myNFT (3 years, cross-chain EVM bridging, Solidity smart contracts, TheGraph subgraphs), Lead Developer at Veepee, and Architect at fulll. He also runs Golden Solar (29 photovoltaic installations, 4 MWp) and conducts independent research in cognitive security."
    align: right
    features:
      - name: Core Blockchain Development
        description: Maintains and evolves the Lotusia blockchain codebase based on Bitcoin ABC
        icon: i-heroicons-code-bracket-solid
      - name: Mining Infrastructure
        description: Built a custom WebGPU GPU miner and operates mining pool infrastructure
        icon: i-heroicons-cpu-chip-solid
      - name: Cross-chain Engineering
        description: Designed and built the Solana bridge and EVM bridging systems
        icon: i-heroicons-arrows-right-left-solid
      - name: Solar Energy & Sustainability
        description: Runs Golden Solar — 29 photovoltaic installations powering real-world decarbonation
        icon: i-heroicons-sun-solid
    links:
      - label: Portfolio
        to: https://guillioud.com
        target: _blank
        color: primary
        icon: i-heroicons-user-solid
        size: lg
      - label: GitHub
