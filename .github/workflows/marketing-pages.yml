name: Marketing Build and Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - "marketing/**"
      - ".github/workflows/marketing-pages.yml"
  push:
    branches:
      - main
    paths:
      - "marketing/**"
      - ".github/workflows/marketing-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: marketing-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build marketing site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        working-directory: marketing
        run: npm ci

      - name: Build site
        working-directory: marketing
        run: npm run build

  deploy:
    name: Deploy to Cloudflare Pages (main)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        working-directory: marketing
        run: npm ci

      - name: Build site
        working-directory: marketing
        run: npm run build

      - name: Deploy with Wrangler
        working-directory: marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist/ --project-name=lotusia-marketing --branch=main
