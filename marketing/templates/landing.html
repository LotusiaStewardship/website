<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Lotusia</title>
    <meta name="description" content="{{description}}">
    <meta property="og:title" content="{{og_title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lotusia.burnlotus.org{{path}}">
    <meta property="og:image" content="https://lotusia.burnlotus.org/assets/images/turtles_hero.jpeg">
    <meta property="og:site_name" content="Lotusia">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://lotusia.burnlotus.org{{path}}">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    {{head_extra}}
</head>
<body>
    {{header}}
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>{{hero_title}}</h1>
                <p class="hero-desc">{{hero_description}}</p>
                {{hero_links}}
            </div>
            {{hero_image}}
        </section>
        {{sections}}
        {{cta}}
    </main>
    {{footer}}
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')</script>
</body>
</html>
