<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Lotusia</title>
    <meta name="description" content="{{description}}">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="author" content="Lotusia Stewardship">
    <meta property="og:title" content="{{og_title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lotusia.burnlotus.org{{path}}">
    <meta property="og:image" content="https://lotusia.burnlotus.org{{og_image}}">
    <meta property="og:site_name" content="Lotusia">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{og_title}}">
    <meta name="twitter:description" content="{{description}}">
    <link rel="canonical" href="https://lotusia.burnlotus.org{{path}}">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    {{json_ld}}
    {{head_extra}}
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen">
    {{header}}
    <main class="min-h-[calc(100vh-var(--header-height))]">
        {{breadcrumb_html}}
        <div class="md:py-40 relative py-16 sm:py-16 lg:py-16">
            <div class="mx-auto px-4 sm:px-6 lg:px-8 max-w-7xl gap-16 sm:gap-y-24 grid lg:grid-cols-2 lg:items-center">
                <div>
                    <h1 class="text-5xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-7xl">{{hero_title}}</h1>
                    <p class="mt-6 text-lg tracking-tight text-gray-600 dark:text-gray-300">{{hero_description}}</p>
                    <div class="mt-10 flex flex-wrap gap-x-6 gap-y-3">{{hero_links}}</div>
                </div>
                <div class="flex justify-center">{{hero_image}}</div>
            </div>
        </div>
        {{sections}}
        {{cta}}
    </main>
    {{footer}}
    <script>
    (function(){
      var t=localStorage.getItem('theme');
      if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
        document.documentElement.classList.add('dark');
      }
    })();
    </script>
</body>
</html>
