<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Lotusia</title>
    <meta name="description" content="Get the latest updates from the Lotusia Ecosystem — blockchain development, protocol upgrades, and community news">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
    <meta name="author" content="Lotusia Stewardship">
    <meta property="og:title" content="Blog - Lotusia">
    <meta property="og:description" content="Get the latest updates from the Lotusia Ecosystem">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lotusia.burnlotus.org/blog">
    <meta property="og:image" content="https://lotusia.burnlotus.org/assets/images/blog_0.jpg">
    <meta property="og:site_name" content="Lotusia">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog - Lotusia">
    <meta name="twitter:description" content="Get the latest updates from the Lotusia Ecosystem">
    <link rel="canonical" href="https://lotusia.burnlotus.org/blog">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "Lotusia Blog",
      "url": "https://lotusia.burnlotus.org/blog",
      "description": "Official blog of the Lotusia Stewardship — blockchain development updates, protocol upgrades, and ecosystem news",
      "publisher": {"@type": "Organization", "name": "Lotusia Stewardship", "url": "https://lotusia.burnlotus.org", "logo": {"@type": "ImageObject", "url": "https://lotusia.burnlotus.org/assets/images/logo.png"}},
      "inLanguage": "en"
    }
    </script>
</head>
<body>
    {{header}}
    <main>
        <nav aria-label="Breadcrumb" class="breadcrumb"><a href="/">Home</a> / <span>Blog</span></nav>
        <section class="hero hero-compact">
            <div class="hero-content">
                <h1>Blog</h1>
                <p class="hero-desc">Get the latest updates from the Ecosystem</p>
            </div>
        </section>
        <section class="blog-list">
            {{blog_posts}}
        </section>
    </main>
    {{footer}}
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')</script>
</body>
</html>
