<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Lotusia</title>
    <meta name="description" content="{{description}}">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
    <meta name="author" content="{{author}}">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://lotusia.burnlotus.org/blog/{{slug}}">
    <meta property="og:image" content="https://lotusia.burnlotus.org{{og_image}}">
    <meta property="og:site_name" content="Lotusia">
    <meta property="article:published_time" content="{{date_iso}}">
    <meta property="article:author" content="{{author}}">
    <meta property="article:section" content="Blockchain">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://lotusia.burnlotus.org{{og_image}}">
    <link rel="canonical" href="https://lotusia.burnlotus.org/blog/{{slug}}">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{title}}",
      "description": "{{description}}",
      "url": "https://lotusia.burnlotus.org/blog/{{slug}}",
      "image": "https://lotusia.burnlotus.org{{og_image}}",
      "datePublished": "{{date_iso}}",
      "author": {"@type": "Organization", "name": "Lotusia Stewardship", "url": "https://lotusia.burnlotus.org"},
      "publisher": {"@type": "Organization", "name": "Lotusia Stewardship", "url": "https://lotusia.burnlotus.org", "logo": {"@type": "ImageObject", "url": "https://lotusia.burnlotus.org/assets/images/logo.png"}},
      "mainEntityOfPage": {"@type": "WebPage", "@id": "https://lotusia.burnlotus.org/blog/{{slug}}"},
      "inLanguage": "en"
    }
    </script>
</head>
<body>
    {{header}}
    <main>
        <nav aria-label="Breadcrumb" class="breadcrumb"><a href="/">Home</a> / <a href="/blog">Blog</a> / <span>{{title}}</span></nav>
        <article class="blog-article" itemscope itemtype="https://schema.org/BlogPosting">
            <header class="article-header">
                <h1 itemprop="headline">{{title}}</h1>
                <p class="article-meta" itemprop="description">{{description}}</p>
                <p class="article-date"><time itemprop="datePublished" datetime="{{date_iso}}">{{date}}</time> · <span itemprop="author">{{author}}</span></p>
            </header>
            <div class="article-body prose" itemprop="articleBody">
                {{body}}
            </div>
        </article>
    </main>
    {{footer}}
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light')</script>
</body>
</html>
