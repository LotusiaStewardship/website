<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | Lotusia</title>
    <meta name="description" content="{{description}}">
    <meta name="robots" content="index, follow">
    <meta name="author" content="{{author}}">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://lotusia.burnlotus.org/blog/{{slug}}">
    <meta property="og:image" content="https://lotusia.burnlotus.org{{og_image}}">
    <meta property="og:site_name" content="Lotusia">
    <meta property="article:published_time" content="{{date_iso}}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://lotusia.burnlotus.org/blog/{{slug}}">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"BlogPosting","headline":"{{title}}","description":"{{description}}","url":"https://lotusia.burnlotus.org/blog/{{slug}}","image":"https://lotusia.burnlotus.org{{og_image}}","datePublished":"{{date_iso}}","author":{"@type":"Organization","name":"Lotusia Stewardship"},"publisher":{"@type":"Organization","name":"Lotusia Stewardship","logo":{"@type":"ImageObject","url":"https://lotusia.burnlotus.org/assets/images/logo.png"}},"inLanguage":"en"}</script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen">
    {{header}}
    <main class="min-h-[calc(100vh-var(--header-height))]">
        <div class="mx-auto px-4 sm:px-6 lg:px-8 max-w-3xl py-12">
            <nav class="text-sm text-gray-500 mb-8"><a href="/" class="hover:text-primary">Home</a> / <a href="/blog" class="hover:text-primary">Blog</a> / <span class="text-gray-900 dark:text-white">{{title}}</span></nav>
            <article itemscope itemtype="https://schema.org/BlogPosting">
                <header class="mb-12">
                    <h1 itemprop="headline" class="text-4xl font-bold tracking-tight mb-4">{{title}}</h1>
                    <p class="text-lg text-gray-600 dark:text-gray-300 mb-2" itemprop="description">{{description}}</p>
                    <p class="text-sm text-gray-500"><time itemprop="datePublished" datetime="{{date_iso}}">{{date}}</time> · <span itemprop="author">{{author}}</span></p>
                </header>
                <div class="prose" itemprop="articleBody">
                    {{body}}
                </div>
            </article>
        </div>
    </main>
    {{footer}}
    <script>if(localStorage.getItem('theme')!=='dark'){document.documentElement.classList.remove('dark')}</script>
</body>
</html>
